{{- if .Values.ingress.enabled }}

apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: ai-platform-ingress
  namespace: {{ .Release.Namespace }}

spec:
  ingressClassName: nginx

  rules:
  - host: {{ .Values.ingress.appHost }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80

  - host: {{ .Values.ingress.apiHost }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-service
            port:
              number: 8000

  - host: {{ .Values.ingress.authHost }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: auth-service
            port:
              number: 8001

{{- end }}