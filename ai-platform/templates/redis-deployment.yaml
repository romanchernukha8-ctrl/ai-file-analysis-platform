apiVersion: apps/v1
kind: Deployment

metadata:
  name: redis
  namespace: {{ .Release.Namespace }}

spec:
  replicas: 1

  selector:
    matchLabels:
      app: redis

  template:
    metadata:
      labels:
        app: redis

    spec:
      containers:
      - name: redis
        image: {{ .Values.redis.image }}

        resources:
{{ toYaml .Values.redis.resources | indent 10 }}

        ports:
        - containerPort: 6379
