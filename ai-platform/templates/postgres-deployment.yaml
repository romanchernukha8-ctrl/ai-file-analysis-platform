apiVersion: apps/v1
kind: Deployment

metadata:
  name: postgres
  namespace: {{ .Release.Namespace }}

spec:
  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:
      containers:
      - name: postgres

        image: {{ .Values.postgres.image }}

        resources:
{{ toYaml .Values.postgres.resources | indent 10 }}

        ports:
        - containerPort: 5432

        env:
        - name: POSTGRES_USER
          value: {{ .Values.config.postgresUser | quote }}

        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: POSTGRES_PASSWORD

        - name: POSTGRES_DB
          value: {{ .Values.config.postgresDb | quote }}

        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data

      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc
