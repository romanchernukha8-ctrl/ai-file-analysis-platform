name: CI Pipeline

on:
push:
branches:
- main

pull_request:
branches:
- main

jobs:
python-check:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Check API syntax
    run: python -m py_compile api/app.py

  - name: Check Auth syntax
    run: python -m py_compile auth/app.py

  - name: Check Worker syntax
    run: python -m py_compile worker/worker.py
```

docker-build:
runs-on: ubuntu-latest

```
needs: python-check

steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Build API image
    run: docker build -t api-test ./api

  - name: Build Auth image
    run: docker build -t auth-test ./auth

  - name: Build Worker image
    run: docker build -t worker-test ./worker

  - name: Build Frontend image
    run: docker build -t frontend-test ./frontend
```
