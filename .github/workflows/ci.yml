name: CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  python-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install development tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt    

      - name: Run Ruff
        run: ruff check .

      - name: Run Black
        run: black --check .

      - name: Check API syntax
        run: python -m py_compile api/app.py

      - name: Check Auth syntax
        run: python -m py_compile auth/app.py

      - name: Check Worker syntax
        run: python -m py_compile worker/worker.py

  helm-check:
    runs-on: ubuntu-latest

    needs: python-check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Helm Lint
        run: helm lint ai-platform

      - name: Helm Template Validation
        run: helm template ai-platform ./ai-platform > /dev/null

  docker-build:
    runs-on: ubuntu-latest

    needs: helm-check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build API image
        run: |
          docker build -t cherroman/api:latest ./api

      - name: Build Auth image
        run: |
          docker build -t cherroman/auth:latest ./auth

      - name: Build Worker image
        run: |
          docker build -t cherroman/worker:latest ./worker

      - name: Build Frontend image
        run: |
          docker build -t cherroman/frontend:latest ./frontend

      - name: Push API image
        run: docker push cherroman/api:latest

      - name: Push Auth image
        run: docker push cherroman/auth:latest

      - name: Push Worker image
        run: docker push cherroman/worker:latest

      - name: Push Frontend image
        run: docker push cherroman/frontend:latest
  deploy:
    runs-on: self-hosted

    needs: docker-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Deploy with Helm
        run: |
          helm upgrade --install ai-platform ./ai-platform \
            -n dev \
            --create-namespace

      - name: Check Rollout Status
        run: |
          kubectl rollout status deployment/api -n dev
          kubectl rollout status deployment/auth -n dev
          kubectl rollout status deployment/worker -n dev
          kubectl rollout status deployment/frontend -n dev